<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할일 앱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <h1>할일 목록</h1>

    <form id="todo-form" class="todo-form">
      <input id="todo-input" type="text" placeholder="할 일을 입력하세요" autocomplete="off" />
      <button type="submit">추가</button>
    </form>

    <ul id="todo-list" class="todo-list"></ul>

    <div id="empty-state" class="empty-state">추가된 할 일이 없습니다.</div>
  </main>

  <div id="edit-modal" class="modal hidden">
    <div class="modal-backdrop" data-action="close-edit"></div>
    <div class="modal-panel">
      <h2>할일 수정</h2>
      <form id="edit-form" class="edit-form">
        <input id="edit-input" type="text" placeholder="수정할 내용을 입력하세요" autocomplete="off" />
        <div class="edit-actions">
          <button type="button" class="todo-button" data-action="close-edit">취소</button>
          <button type="submit" class="todo-button primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
